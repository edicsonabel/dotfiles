[colors]
draw_bold_text_with_bright_colors = true

[colors.bright]
black = "0x424242"
blue = "0x1E8EFF"
cyan = "0x1EFF8E"
green = "0x8EFF1E"
magenta = "0x8E1EFF"
red = "0xFF1E8E"
white = "0xC2C2C2"
yellow = "0xFF8E1E"

[colors.normal]
black = "0x363636"
blue = "0x0883FF"
cyan = "0x08FF83"
green = "0x83FF08"
magenta = "0x8308FF"
red = "0xFF0883"
white = "0xB6B6B6"
yellow = "0xFF8308"

[colors.primary]
background = "0x0D1926"
foreground = "0xB4E1FD"

[colors.selection]
text = "0xB4E1FD"

[cursor]
blink_interval = 500

[cursor.style]
blinking = "Always"
shape = "Underline"

[font]
size = 12.0

[font.bold]
family = "Bitstream Vera Sans Mono"
style = "Bold"

[font.bold_italic]
family = "Bitstream Vera Sans Mono"
style = "Bold Italic"

[font.italic]
family = "Bitstream Vera Sans Mono"
style = "Italic"

[font.normal]
family = "Bitstream Vera Sans Mono"
style = "Regular"

[font.offset]
x = -1
y = 3

[scrolling]
history = 5000

[terminal]
shell = { program = "/usr/bin/tmux", args = ["new-session", "-A", "-s", "🚀"] }

[window]
decorations = "None"
opacity = 0.85
startup_mode = "Maximized"

[window.padding]
x = 6
y = 6
